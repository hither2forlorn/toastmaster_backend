name: Keep Render Service Awake

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Health Endpoint
        run: |
          echo "🏓 Pinging health endpoint..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://toastmaster-api.onrender.com/api/health)

          if [ $response -eq 200 ]; then
            echo "✅ Service is alive! (Status: $response)"
          else
            echo "⚠️  Unexpected status: $response"
            exit 1
          fi

      - name: Log Timestamp
        run: |
          echo "Ping completed at: $(date -u)"
